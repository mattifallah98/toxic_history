<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asal Toxic Archive 🚨</title>
  <style>
    :root{
      --yellow:#ffdf4d;
      --blue:#7ed6ff;
      --deep:#006d9c;
      --pink:#ff74b8;
      --green:#7bd86f;
      --sand:#ffe8a3;
      --ink:#17313b;
      --white:#fffdf4;
      --danger:#ff5c5c;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, Tahoma, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.55) 0 14px, transparent 15px),
        radial-gradient(circle at 80% 12%, rgba(255,255,255,.45) 0 10px, transparent 11px),
        radial-gradient(circle at 70% 75%, rgba(255,255,255,.35) 0 18px, transparent 19px),
        linear-gradient(180deg, var(--blue), #baf0ff 55%, var(--sand));
      padding:24px;
    }

    .app{
      width:min(980px, 100%);
      margin:0 auto;
    }

    .hero{
      background:rgba(255,253,244,.88);
      border:4px solid var(--ink);
      border-radius:30px;
      padding:24px;
      box-shadow:8px 8px 0 rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .hero:before{
      content:"";
      position:absolute;
      left:-45px;
      top:-45px;
      width:150px;
      height:150px;
      border-radius:50%;
      background:var(--yellow);
      border:4px solid var(--ink);
      opacity:.9;
    }

    .hero:after{
      content:"";
      position:absolute;
      right:-35px;
      bottom:-35px;
      width:120px;
      height:120px;
      border-radius:24px;
      background:var(--pink);
      border:4px solid var(--ink);
      transform:rotate(10deg);
      opacity:.8;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(28px, 6vw, 52px);
      line-height:1.1;
      position:relative;
      z-index:1;
    }

    .subtitle{
      margin:0;
      font-size:16px;
      position:relative;
      z-index:1;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:20px;
    }

    .card{
      background:rgba(255,253,244,.94);
      border:4px solid var(--ink);
      border-radius:26px;
      padding:18px;
      box-shadow:6px 6px 0 rgba(0,0,0,.16);
    }

    .card h2{
      margin:0 0 14px;
      font-size:22px;
    }

    label{
      display:block;
      font-weight:bold;
      margin:12px 0 6px;
    }

    input, select, textarea{
      width:100%;
      padding:12px 13px;
      border:3px solid var(--ink);
      border-radius:16px;
      background:white;
      font:inherit;
      outline:none;
    }

    textarea{min-height:80px; resize:vertical}

    input:focus, select:focus, textarea:focus{
      box-shadow:0 0 0 4px rgba(255,116,184,.35);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    button{
      border:3px solid var(--ink);
      border-radius:999px;
      padding:12px 16px;
      font-weight:900;
      font-family:inherit;
      cursor:pointer;
      box-shadow:4px 4px 0 rgba(0,0,0,.2);
      transition:.1s transform, .1s box-shadow;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:5px 6px 0 rgba(0,0,0,.2);
    }

    button:active{
      transform:translateY(2px);
      box-shadow:2px 2px 0 rgba(0,0,0,.2);
    }

    .primary{background:var(--yellow)}
    .secondary{background:var(--green)}
    .pink{background:var(--pink)}
    .danger{background:var(--danger); color:white}
    .ghost{background:white}

    .counter{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:var(--deep);
      color:white;
      padding:8px 12px;
      border-radius:999px;
      font-weight:bold;
      margin-bottom:10px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:565px;
      overflow:auto;
      padding-left:4px;
    }

    .empty{
      padding:20px;
      background:rgba(255,255,255,.75);
      border:3px dashed var(--ink);
      border-radius:20px;
      text-align:center;
      font-weight:bold;
    }

    .item{
      background:rgba(255,255,255,.78);
      border:3px solid var(--ink);
      border-radius:20px;
      padding:12px;
      backdrop-filter: blur(2px);
    }

    .itemTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }

    .name{
      font-size:18px;
      font-weight:900;
    }

    .badge{
      display:inline-block;
      padding:5px 10px;
      border:2px solid var(--ink);
      border-radius:999px;
      background:var(--yellow);
      font-size:13px;
      font-weight:bold;
      margin-top:6px;
      margin-left:6px;
    }

    .badge.toxic{background:var(--danger); color:white}
    .badge.safe{background:var(--green)}
    .badge.unsure{background:#ddd}

    .note{
      margin:10px 0 0;
      line-height:1.7;
      color:#345;
    }

    .mini{
      font-size:13px;
      opacity:.9;
      line-height:1.7;
      margin-top:10px;
    }

    .status{
      margin-top:12px;
      padding:12px;
      border:3px solid var(--ink);
      border-radius:18px;
      background:#fff;
      display:none;
      font-weight:bold;
    }

    .status.show{display:block}

    footer{
      text-align:center;
      margin:18px 0 0;
      font-size:13px;
      opacity:.85;
    }

    aside.card{
      position:relative;
      overflow:hidden;
    }

    aside.card::before{
      content:"";
      position:absolute;
      inset:0;
      background:url("./images/spongebob.png") center center / cover no-repeat;
      opacity:0.16;
      z-index:0;
      pointer-events:none;
    }

    aside.card > *{
      position:relative;
      z-index:1;
    }

    @media (max-width:820px){
      body{padding:14px}
      .grid{grid-template-columns:1fr}
      .row{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <h1>🧽 Asal Toxic Archive</h1>
      <p class="subtitle">هر رابطه رو وارد کن، بزن تاکسیک بعدی</p>
    </section>

    <section class="grid">
      <form class="card" id="relationshipForm">
        <h2>پرونده جدید 🪼</h2>

        <label for="partnerName">اسم طرف</label>
        <input id="partnerName" name="partnerName" placeholder="مثلاً: فلانی " required />

        <div class="row">
          <div>
            <label for="partnerAge">سن طرف</label>
            <input id="partnerAge" name="partnerAge" type="number" min="10" max="120" placeholder="مثلاً ۳۰" />
          </div>

          <div>
            <label for="myAge">سن خودت وقتی دیت بودی</label>
            <input id="myAge" name="myAge" type="number" min="10" max="120" placeholder="مثلاً ۲۴" />
          </div>
        </div>

        <label for="wasToxic">تاکسیک بود؟</label>
        <select id="wasToxic" name="wasToxic">
          <option value="Yes">بله، زنگ خطر</option>
          <option value="No">نه، نسبتاً انسان سالمی بود</option>
          <option value="Maybe">هنوز رأی ندادی</option>
        </select>

        <label for="relationshipType">تایپ رابطه</label>
        <select id="relationshipType" name="relationshipType">
          <option value="Long-term">طولانی</option>
          <option value="Short-term">کوتاه</option>
          <option value="One-night">وان نایت</option>
          <option value="Friends with benefits">بنفیت</option>
          <option value="Simple crush">کراش ساده</option>
          <option value="Situationship">سیچوین‌شیپ / Situationship</option>
          <option value="Other">دارای توضیحات / Other</option>
        </select>

        <label for="description">توضیحات اضافه</label>
        <textarea id="description" name="description" placeholder="مثلاً: قصد ازدواج..."></textarea>

        <div class="actions">
          <button type="submit" class="primary">تاکسیک بعدی ➜</button>
          <button type="button" id="downloadBtn" class="secondary">پایان</button>
        </div>

        <div class="status" id="statusBox"></div>
      </form>

      <aside class="card">
        <div class="counter">🧾 تعداد پرونده‌ها: <span id="count">0</span></div>
        <h2>لیست روابط واردشده</h2>
        <div class="list" id="list"></div>
      </aside>
    </section>

    <footer>
      Inspired by underwater chaos. No official SpongeBob assets included.
    </footer>
  </main>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby2YbpLVBs7fzVRjOdhXUq1JcZtBofR6viMu8MYO1qxQpXkxx9nwjLd5UNDxg0BVazqZw/exec";

    const STORAGE_KEY = "bikini_bottom_toxic_archive_v1";
    const form = document.getElementById("relationshipForm");
    const list = document.getElementById("list");
    const count = document.getElementById("count");
    const statusBox = document.getElementById("statusBox");

    let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      render();
    }

    function showStatus(message, type = "normal"){
      statusBox.textContent = message;
      statusBox.className = "status show";

      if(type === "error"){
        statusBox.style.background = "#ffe1e1";
      }else if(type === "success"){
        statusBox.style.background = "#dcffd8";
      }else{
        statusBox.style.background = "#fff";
      }
    }

    function escapeHTML(value){
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toxicClass(value){
      if(value === "Yes") return "toxic";
      if(value === "No") return "safe";
      return "unsure";
    }

    function toxicLabel(value){
      if(value === "Yes") return "Toxic";
      if(value === "No") return "Not toxic";
      return "Unclear";
    }

    function render(){
      count.textContent = records.length;

      if(!records.length){
        list.innerHTML = `<div class="empty">هنوز هیچ موجودی ثبت نشده </div>`;
        return;
      }

      list.innerHTML = records.map((r, index) => `
        <article class="item">
          <div class="itemTop">
            <div>
              <div class="name">${index + 1}. ${escapeHTML(r.partnerName)}</div>
              <span class="badge ${toxicClass(r.wasToxic)}">${toxicLabel(r.wasToxic)}</span>
              <span class="badge">${escapeHTML(r.relationshipType)}</span>
            </div>
            <button class="ghost" onclick="deleteRecord(${index})">حذف</button>
          </div>

          <div class="mini">
            سن  طرف: ${escapeHTML(r.partnerAge || "—")} |
            سن تو: ${escapeHTML(r.myAge || "—")} |
          </div>

          ${r.description ? `<p class="note">${escapeHTML(r.description)}</p>` : ""}
        </article>
      `).join("");
    }

    window.deleteRecord = function(index){
      records.splice(index, 1);
      save();
      showStatus("یک پسر حذف شد.");
    }

    form.addEventListener("submit", function(e){
      e.preventDefault();

      const data = new FormData(form);

      const record = {
        partnerName: data.get("partnerName").trim(),
        partnerAge: data.get("partnerAge"),
        myAge: data.get("myAge"),
        wasToxic: data.get("wasToxic"),
        relationshipType: data.get("relationshipType"),
        description: data.get("description").trim(),
        createdAt: new Date().toLocaleString()
      };

      if(!record.partnerName){
        showStatus("اسم طرف رو بزن حتی فوشی چیزی ", "error");
        return;
      }

      records.push(record);
      save();

      form.reset();
      document.getElementById("partnerName").focus();
      showStatus("ثبت شد. بعدی.", "success");
    });

    function makeCSV(){
      const headers = [
        "Partner Name",
        "Approx Partner Age",
        "My Age While Dating",
        "Was Toxic",
        "Relationship Type",
        "Description",
        "Created At"
      ];

      const rows = records.map(r => [
        r.partnerName,
        r.partnerAge,
        r.myAge,
        r.wasToxic,
        r.relationshipType,
        r.description,
        r.createdAt
      ]);

      const csvRows = [headers, ...rows].map(row =>
        row.map(cell => `"${String(cell || "").replaceAll('"', '""')}"`).join(",")
      );

      return "\uFEFF" + csvRows.join("\n");
    }

    function downloadCSV(){
      const blob = new Blob([makeCSV()], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "bikini_bottom_toxic_archive.csv";

      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    async function sendToGoogleScript(){
      const payload = {
        title: "Bikini Bottom Toxic Archive",
        records: records
      };

      await fetch(GAS_WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
      });
    }

    document.getElementById("downloadBtn").addEventListener("click", async function(){
      if(!records.length){
        showStatus("اول حداقل یه رابطه ثبت کن.", "error");
        return;
      }

      downloadCSV();

      try{
        await sendToGoogleScript();
        showStatus("فایل دانلود شد و درخواست ارسال ایمیل هم فرستاده شد.", "success");
      }catch(error){
        showStatus("فایل دانلود شد، ولی ارسال ایمیل مشکل داشت. لینک Google Script را چک کن.", "error");
      }
    });

    render();
  </script>
</body>
</html>
